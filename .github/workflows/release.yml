name: Release

# Builds Table Relay for macOS, Windows and Linux and attaches the installers
# to the GitHub Release that triggered the run.
#
# How to cut a release:
#   1. Bump the version in package.json AND src-tauri/tauri.conf.json (keep them
#      in sync), commit, and push to main.
#   2. On GitHub: Releases -> Draft a new release -> create a tag like `v0.2.0`
#      -> Publish (or save as draft — either fires this workflow).
#   3. The matrix builds run; each uploads its installer(s) to that release.
#
# Builds are UNSIGNED:
#   - macOS: users right-click the .app inside the .dmg and choose "Open" the
#     first time to get past Gatekeeper.
#   - Windows: SmartScreen shows an "unknown publisher" warning — "More info" ->
#     "Run anyway".
# Add code signing later by supplying the cert secrets to tauri-action.
#
# macOS .dmg is assembled by hand (hdiutil) in the "Build macOS DMG" step rather
# than by Tauri's bundler — see that step's comment for why.

on:
  release:
    types: [created]   # fires when a release (or draft) is created in the UI

# Allow tauri-action to upload assets onto the triggering release.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon (M-series). Build only the .app — we assemble the .dmg
          # ourselves below because GitHub's macOS runners broke Tauri's
          # Finder/AppleScript DMG bundler.
          - label: macOS (arm64)
            platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app
          # Intel Macs
          - label: macOS (x64)
            platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles app
          # Linux .deb / .AppImage / .rpm (Currently Disabled)
          # - label: Linux (x64)
          #   platform: ubuntu-22.04
          #   target: x86_64-unknown-linux-gnu
          #   args: ""
          # Windows .msi / .exe
          - label: Windows (x64)
            platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Linux build deps for Tauri v2 (GTK + WebKitGTK 4.1 + AppIndicator).
      # Not needed on macOS/Windows. SQLite is bundled and TLS is rustls, so no
      # libsqlite3-dev / libssl-dev are required.
      # (Currently Disabled)
      # - name: Install Linux dependencies
      #   if: matrix.platform == 'ubuntu-22.04'
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y \
      #       libwebkit2gtk-4.1-dev \
      #       libappindicator3-dev \
      #       librsvg2-dev \
      #       patchelf \
      #       libgtk-3-dev \
      #       build-essential \
      #       curl wget file

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache the Cargo build so reruns are fast. This is a virtual workspace
      # (root Cargo.toml), so the target dir is at the repo root, not src-tauri/.
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      # tauri-action runs `npm run build` (beforeBuildCommand) then `tauri build`,
      # and uploads the resulting installers to the release identified by tagName.
      # On macOS we restrict bundles to `app` (see matrix) — the DMG is built in
      # the next step.
      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_TOKEN: ${{ secrets.APP_TOKEN }}
        with:
          tagName: ${{ github.event.release.tag_name }}
          releaseId: ${{ github.event.release.id }}
          args: ${{ matrix.args }}

      # macOS .app/.dmg are signed and packaged by the SAME scripts used locally
      # (scripts/sign-mac.sh + scripts/make-dmg.sh) so CI and `npm run build:mac`
      # stay in lockstep — fix a bug once, it applies everywhere. The scripts
      # take the target triple as $1 and read from target/<triple>/...
      #
      # Why we do this ourselves instead of Tauri's bundler:
      #   - Signing: Apple Silicon won't launch an unsigned binary; sign-mac.sh
      #     applies an ad-hoc signature (no Apple account/cert needed). This is
      #     NOT notarization — downloaded .dmgs still hit Gatekeeper quarantine,
      #     fixed once with `xattr -dr com.apple.quarantine` (see README).
      #   - DMG: GitHub's macOS runners removed Finder (June 2025 image), which
      #     breaks Tauri's bundle_dmg.sh (AppleScript + hdiutil detach). CI=true
      #     does NOT help. make-dmg.sh uses plain `hdiutil create`, no Finder.
      - name: Sign macOS app
        if: runner.os == 'macOS'
        run: bash scripts/sign-mac.sh "${{ matrix.target }}"

      - name: Build macOS DMG
        if: runner.os == 'macOS'
        run: bash scripts/make-dmg.sh "${{ matrix.target }}"

      - name: Upload macOS DMG to release
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          dmg=$(ls *.dmg | head -n1)
          echo "Uploading $dmg"
          gh release upload "${{ github.event.release.tag_name }}" "$dmg" --clobber

  # Publish/refresh the Homebrew Cask in the tap repo so macOS users can
  # `brew install --cask tofikhidayatxyz/tap/table-relay`. Runs only after the
  # macOS DMGs are attached to the release (needs them present for the URLs).
  #
  # One-time setup before this works:
  #   1. Create an EMPTY public repo: tofikhidayatxyz/homebrew-tap
  #      (Homebrew drops the "homebrew-" prefix, so the tap is `tofikhidayatxyz/tap`.)
  #   2. Create a fine-grained PAT with Contents: Read/Write on that repo
  #      (a classic PAT with `repo` scope also works) and add it to THIS repo's
  #      secrets as HOMEBREW_TAP_TOKEN.
  # Skips itself (no failure) if the secret is absent, so releases still work
  # before the tap is set up.
  homebrew-cask:
    name: Publish Homebrew Cask
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check for tap token
        id: gate
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping cask publish."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tap repo
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          repository: tofikhidayatxyz/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Generate cask
        if: steps.gate.outputs.enabled == 'true'
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          # Strip a leading "v" from the tag to get the bare version (v0.2.0 -> 0.2.0).
          version="${TAG#v}"
          repo="${{ github.repository }}"   # tofikhidayatxyz/db-table
          base="https://github.com/${repo}/releases/download/${TAG}"
          arm_dmg="Table_Relay_${version}_aarch64.dmg"
          intel_dmg="Table_Relay_${version}_x86_64.dmg"

          mkdir -p tap/Casks
          # Build the cask with printf (no heredoc) so YAML indentation can't
          # corrupt the file. %s args fill in version / urls / repo; the literal
          # Ruby interpolation #{appdir} is written as a plain string.
          printf '%s\n' \
            "cask \"table-relay\" do" \
            "  version \"${version}\"" \
            "" \
            "  on_arm do" \
            "    url \"${base}/${arm_dmg}\"" \
            "    sha256 :no_check" \
            "  end" \
            "  on_intel do" \
            "    url \"${base}/${intel_dmg}\"" \
            "    sha256 :no_check" \
            "  end" \
            "" \
            "  name \"Table Relay\"" \
            "  desc \"Desktop database client (MySQL, PostgreSQL, SQLite, MongoDB, Redis)\"" \
            "  homepage \"https://github.com/${repo}\"" \
            "" \
            "  app \"Table Relay.app\"" \
            "" \
            "  # Ad-hoc signed but not notarized, so first launch hits Gatekeeper" \
            "  # quarantine. Clear it on install so the app opens normally." \
            "  postflight do" \
            "    system_command \"/usr/bin/xattr\"," \
            "                   args: [\"-dr\", \"com.apple.quarantine\", \"#{appdir}/Table Relay.app\"]," \
            "                   sudo: false" \
            "  end" \
            "" \
            "  zap trash: [" \
            "    \"~/Library/Application Support/me.bytelogic.tablerelay\"," \
            "    \"~/Library/Caches/me.bytelogic.tablerelay\"," \
            "    \"~/Library/Preferences/me.bytelogic.tablerelay.plist\"," \
            "    \"~/Library/Saved Application State/me.bytelogic.tablerelay.savedState\"," \
            "  ]" \
            "end" \
            > tap/Casks/table-relay.rb

          echo "----- generated cask -----"
          cat tap/Casks/table-relay.rb

      - name: Commit and push cask
        if: steps.gate.outputs.enabled == 'true'
        working-directory: tap
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/table-relay.rb
          if git diff --staged --quiet; then
            echo "Cask already up to date — nothing to commit."
          else
            git commit -m "table-relay ${TAG}"
            git push
          fi