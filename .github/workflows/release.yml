name: Release

# Builds Table Relay for macOS, Windows and Linux and attaches the installers
# to the GitHub Release that triggered the run.
#
# How to cut a release:
#   1. Bump the version in package.json AND src-tauri/tauri.conf.json (keep them
#      in sync), commit, and push to main.
#   2. On GitHub: Releases -> Draft a new release -> create a tag like `v0.2.0`
#      -> Publish (or save as draft — either fires this workflow).
#   3. The matrix builds run; each uploads its installer(s) to that release.
#
# Builds are UNSIGNED:
#   - macOS: users right-click the .app/.dmg and choose "Open" the first time to
#     get past Gatekeeper.
#   - Windows: SmartScreen shows an "unknown publisher" warning — "More info" ->
#     "Run anyway".
# Add code signing later by supplying the cert secrets to tauri-action.

on:
  release:
    types: [created]   # fires when a release (or draft) is created in the UI

# Allow tauri-action to upload assets onto the triggering release.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon (M-series)
          - label: macOS (arm64)
            platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          # Intel Macs
          - label: macOS (x64)
            platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          # Linux .deb / .AppImage / .rpm
          - label: Linux (x64)
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          # Windows .msi / .exe
          - label: Windows (x64)
            platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Linux build deps for Tauri v2 (GTK + WebKitGTK 4.1 + AppIndicator).
      # Not needed on macOS/Windows. SQLite is bundled and TLS is rustls, so no
      # libsqlite3-dev / libssl-dev are required.
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            build-essential \
            curl wget file

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache the Cargo build for the workspace under src-tauri so reruns are fast.
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      # tauri-action runs `npm run build` (beforeBuildCommand) then `tauri build`,
      # and uploads the resulting installers to the release identified by tagName.
      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.release.tag_name }}
          releaseId: ${{ github.event.release.id }}
          args: ${{ matrix.args }}
